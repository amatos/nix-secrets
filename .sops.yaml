# sops-nix migration experiment (SOPS_MIGRATION.md) — age recipients
# transcribed from nix-secrets/secrets.nix. Moved here from nixie's repo root
# once Step 6 decided nix-secrets is the one surviving secrets repo — this is
# where secrets actually get encrypted/edited going forward.
#
# Per-host keys below are still the legacy ragenix-derived host keys except
# *codex_ssh, which is codex's real SSH host key converted to age's X25519
# format (Step 8's decided identity source) — codex is the only host wired
# up for the Step 9 PoC so far. The rest get switched over in Phase 3
# batches; until then the fleet-wide catch-all rule still lists the old
# *gammu/*porkchop/*huginn/*muninn ragenix keys unchanged, since real
# migration for those hasn't happened yet.
#
# IMPORTANT — this must be the *converted* age1... form (matching what
# `ssh-to-age -i <host>.pub` computes), NOT the raw `ssh-ed25519 AAAA...`
# public key string. sops-nix's actual deploy-time tool
# (sops-install-secrets, driven by `sops.age.sshKeyPaths`) converts the SSH
# private key into a plain X25519 age identity internally and matches it
# against a plain age1... recipient — confirmed directly from its own log
# output ("Imported ... as age key with fingerprint age1dq4gttsz...",
# exactly matching ssh-to-age's output). A raw ssh-ed25519 recipient string
# *does* work with plain `sops`/`age` CLI (`age -R`/`-i sshkey`), but that's
# a red herring: `age -R` produces an SSH-specific ciphertext stanza that
# only `-i sshkey`-style identity loading unwraps, which is a different
# (and, for our purposes, irrelevant) code path from what sops-install-
# secrets actually does. See SOPS_MIGRATION.md's Step 9 notes for the full,
# corrected diagnosis (an earlier version of this file/notes had it backwards).
keys:
  - &alberth age1gp5d3tzdpufcrk7f6dkr92xtx2p847k79kxxdp9nn0yjk2qvw34sws84m7
  - &yubikey_d43f4e92 age1yubikey1qdxkz5rs00du7y4284ehlkktq0h93wsqszwegjrx97scqs8ptq3f6kws7sq
  - &yubikey_2ab5ff2f age1yubikey1qtn8y2ad0vr9ddazfsxy4fmlt64kknhjsll2xvfgekck3n0dc0xjvf5rah6
  - &yubikey_be7a2b66 age1yubikey1qgmkn4s840hwg4kfazjn6u4r2nq9utl60chscraq4sqg9jsf0wleu5eldvv
  - &yubikey_49705840 age1yubikey1qtkf5924nev2a5vqncdurp729tq6xmdf27y6x95fv7kk5zje5vqr6umpnj8
  - &yubikey_7cb1cad0 age1yubikey1q0pmgm34s0ckw8jj9auzlvm5mc6mpxxgc5syu0aw55cqu2hnm7krqrnq60a
  - &yubikey_b4d67c6f age1yubikey1qt9a6xc0nzpe484kzeuw55hsm4shu3ug9j6m4ngtsexqrgptd6zfx596dqn
  - &codex age1yl42nc3qmtper3vt7am3f2u6f2afp7scu2nqxfqjlw4qn64qeaqq20xkcc
  - &codex_ssh age1dq4gttszvhkf5j6kcvquggnc7a4vxrwgyk6k4ldxmmpekc7pzupqegqrdm
  - &gammu age12vhj5z6zepnz7uyzks23p6rgwa7rudja7ectsrl89zf96nnmfcnq264972
  - &porkchop age1yegmaunkewrxj3v6lt86nalta0xq5gq7dpcxrggqp8p7nlzdde4qsnq5jz
  - &porkchop_ssh age1qytulrl6hskztw95hzcjlwgyswzua9v38xrdl56phhctkudc2pxqlekktk
  - &huginn age1je5xg9s90g8l0307xpphclxj3fugvkl59ne9yna46lne9fw0wfpq59lzux
  - &huginn_ssh age1j0plfmmtayqhn4dcce0h7z4fapyra2t22wjwk2e3vz57njf34p7qryg2yg
  - &muninn age1hryy6kdlt3ufej07r9rp2g8x8pm0e6ndgdyke6jdq95uchnjdghqprayh9

creation_rules:
  # Step 9 PoC — ghostty-themes.yaml's "dracula" key, scoped to just users +
  # codex's real ssh-to-age key (not the full fleet-wide *codex/*gammu/etc.
  # group below) to keep this PoC's blast radius to the one host it's
  # actually validated on. Must precede the fleet-wide catch-all rule.
  - path_regex: ^ghostty-themes\.yaml$
    key_groups:
      - age:
          - *alberth
          - *yubikey_d43f4e92
          - *yubikey_2ab5ff2f
          - *yubikey_be7a2b66
          - *yubikey_49705840
          - *yubikey_7cb1cad0
          - *yubikey_b4d67c6f
          - *codex_ssh
  # ldapHosts — muninn's KDC/LDAP boot-time secrets (highest-consequence group)
  - path_regex: ^ldap/.*$
    key_groups:
      - age:
          - *alberth
          - *yubikey_d43f4e92
          - *yubikey_2ab5ff2f
          - *yubikey_be7a2b66
          - *yubikey_49705840
          - *yubikey_7cb1cad0
          - *yubikey_b4d67c6f
          - *muninn

  # unifiBackupHosts — unifi-backup runs on porkchop
  - path_regex: ^unifi/backup-ssh-key.*$
    key_groups:
      - age:
          - *alberth
          - *yubikey_d43f4e92
          - *yubikey_2ab5ff2f
          - *yubikey_be7a2b66
          - *yubikey_49705840
          - *yubikey_7cb1cad0
          - *yubikey_b4d67c6f
          - *porkchop

  # smtpSmartRelays (Step 12) — huginn (primary) + porkchop (backup), using
  # their real ssh-to-age-derived keys, not the legacy ragenix *porkchop/
  # *huginn anchors (those stay in the fleet-wide catch-all below for
  # not-yet-migrated secrets).
  - path_regex: ^smtp-relay-sasl\.yaml$
    key_groups:
      - age:
          - *alberth
          - *yubikey_d43f4e92
          - *yubikey_2ab5ff2f
          - *yubikey_be7a2b66
          - *yubikey_49705840
          - *yubikey_7cb1cad0
          - *yubikey_b4d67c6f
          - *porkchop_ssh
          - *huginn_ssh

  # remoteBuildHosts — codex is the remote-build client
  - path_regex: ^builder/codex-ssh-key.*$
    key_groups:
      - age:
          - *alberth
          - *yubikey_d43f4e92
          - *yubikey_2ab5ff2f
          - *yubikey_be7a2b66
          - *yubikey_49705840
          - *yubikey_7cb1cad0
          - *yubikey_b4d67c6f
          - *codex

  # grafanaHosts — Grafana runs on porkchop
  - path_regex: ^grafana-secret-key.*$
    key_groups:
      - age:
          - *alberth
          - *yubikey_d43f4e92
          - *yubikey_2ab5ff2f
          - *yubikey_be7a2b66
          - *yubikey_49705840
          - *yubikey_7cb1cad0
          - *yubikey_b4d67c6f
          - *porkchop

  # Fleet-wide catch-all — users ++ systems (also covers syncthingHosts,
  # which is currently identical to systems). Must stay last: sops uses
  # first-matching-rule-wins, so this is the fallback for every path not
  # matched above (github/*, luadns.ini, tailscale-authkey, cachix-authtoken,
  # default-nixos-user-password, unifi/api-key, users/*, ghostty-themes/*,
  # syncthing-gui-password).
  - path_regex: .*
    key_groups:
      - age:
          - *alberth
          - *yubikey_d43f4e92
          - *yubikey_2ab5ff2f
          - *yubikey_be7a2b66
          - *yubikey_49705840
          - *yubikey_7cb1cad0
          - *yubikey_b4d67c6f
          - *codex
          - *gammu
          - *porkchop
          - *huginn
          - *muninn
